<!doctype html>
<html lang="es">

<head>

<meta charset="utf-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Graficador de Funciones</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/css/bootstrap.min.css" 
rel="stylesheet">


<style>

body{
    background:#3f4146;
}


.card{
    border-radius:15px;
    overflow:hidden;
}


#grafica{
    background:white;
    border-radius:10px;
    display:flex;
    justify-content:center;
}


#grafica svg{
    transition:0.3s;
    transform-origin:center;
}


</style>


</head>



<body>


<nav class="navbar navbar-dark bg-dark shadow">

<div class="container justify-content-center">

<span class="navbar-brand fs-3">

Graficador de Funciones

</span>

</div>

</nav>




<div class="container mt-4">


<div class="card shadow">



<div class="card-header bg-dark text-white text-center">

<h3>
Plano Cartesiano
</h3>

</div>




<div class="card-body text-center">



<div id="grafica" class="p-3"></div>




<div class="mt-4">


<button id="zoomMas" class="btn btn-success btn-lg me-3">

Zoom +

</button>



<button id="zoomMenos" class="btn btn-danger btn-lg">

Zoom -

</button>


</div>


</div>


</div>


</div>







<script>



function dibujarParabolaSVG(){



const width = 640;

const height = 480;

const paso = 40;



const contenedor = document.getElementById("grafica");



contenedor.innerHTML = "";




const svg = document.createElementNS(
"http://www.w3.org/2000/svg",
"svg"
);



svg.setAttribute("width",width);

svg.setAttribute("height",height);

svg.style.border="1px solid black";







for(let x=0;x<=width;x+=paso){


let linea=document.createElementNS(
"http://www.w3.org/2000/svg",
"line"
);



linea.setAttribute("x1",x);

linea.setAttribute("y1",0);

linea.setAttribute("x2",x);

linea.setAttribute("y2",height);

linea.setAttribute("stroke","#ddd");


svg.appendChild(linea);


}





for(let y=0;y<=height;y+=paso){


let linea=document.createElementNS(
"http://www.w3.org/2000/svg",
"line"
);



linea.setAttribute("x1",0);

linea.setAttribute("y1",y);

linea.setAttribute("x2",width);

linea.setAttribute("y2",y);

linea.setAttribute("stroke","#ddd");


svg.appendChild(linea);


}







const centroX = width/2;

const centroY = height/2;





let ejeX=document.createElementNS(
"http://www.w3.org/2000/svg",
"line"
);



ejeX.setAttribute("x1",0);

ejeX.setAttribute("y1",centroY);

ejeX.setAttribute("x2",width);

ejeX.setAttribute("y2",centroY);

ejeX.setAttribute("stroke","black");



svg.appendChild(ejeX);






let ejeY=document.createElementNS(
"http://www.w3.org/2000/svg",
"line"
);



ejeY.setAttribute("x1",centroX);

ejeY.setAttribute("y1",0);

ejeY.setAttribute("x2",centroX);

ejeY.setAttribute("y2",height);

ejeY.setAttribute("stroke","black");



svg.appendChild(ejeY);








const path=document.createElementNS(
"http://www.w3.org/2000/svg",
"path"
);



let d="";





for(let x=-width/2;x<width/2;x++){



let y=0.01*x*x;



let svgX=x+centroX;

let svgY=centroY-y;




if(x==-width/2){

d+=`M ${svgX} ${svgY}`;

}else{

d+=`L ${svgX} ${svgY}`;

}


}






path.setAttribute("d",d);

path.setAttribute("stroke","red");

path.setAttribute("fill","none");

path.setAttribute("stroke-width","3");



svg.appendChild(path);






contenedor.appendChild(svg);



}







let escala=1;





document.getElementById("zoomMas").onclick=function(){



escala +=0.1;



document.querySelector("svg").style.transform =
`scale(${escala})`;



};







document.getElementById("zoomMenos").onclick=function(){



if(escala>0.5){



escala-=0.1;



document.querySelector("svg").style.transform =
`scale(${escala})`;



}


};






dibujarParabolaSVG();



</script>



</body>


</html>
