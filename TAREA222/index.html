<!doctype html>
<html lang="es">

<head>

<meta charset="utf-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Graficador de Funciones</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/css/bootstrap.min.css" rel="stylesheet">


<style>

body{
    background:#3f4146;
}


.card{
    border-radius:15px;
    overflow:hidden;
}


canvas{
    background:white;
    border-radius:10px;
    border:2px solid black;
    transition:0.3s;
    transform-origin:center;
}


#grafica{
    display:flex;
    justify-content:center;
    overflow:hidden;
}


</style>


</head>



<body>


<nav class="navbar navbar-dark bg-dark shadow">


<div class="container justify-content-center">


<span class="navbar-brand fs-3">

Graficador de Funciones

</span>


</div>


</nav>





<div class="container mt-4">



<div class="card shadow">





<div class="card-header bg-dark text-white text-center">


<h3>

Plano Cartesiano

</h3>


</div>





<div class="card-body text-center">





<input 
id="funcion"
class="form-control mb-3"
placeholder="Ejemplo: x*x">






<button 
onclick="graficar()"
class="btn btn-primary mb-3">


Graficar


</button>





<div id="grafica">


<canvas 
id="circlechart"
width="640"
height="480">

</canvas>


</div>





<br><br>





<button 
onclick="zoomMas()"
class="btn btn-success me-3">


Zoom +


</button>





<button 
onclick="zoomMenos()"
class="btn btn-danger">


Zoom -


</button>






</div>





</div>


</div>







<script>



let zoom = 1;





function graficar(){



const canvas =
document.getElementById("circlechart");



const ctx =
canvas.getContext("2d");





let w = canvas.width;

let h = canvas.height;





ctx.clearRect(
0,
0,
w,
h
);






// fondo

ctx.fillStyle="white";

ctx.fillRect(
0,
0,
w,
h
);






let centroX = w/2;

let centroY = h/2;






// cuadrícula


ctx.strokeStyle="#cccccc";

ctx.lineWidth=1;




for(let x=0;x<=w;x+=40){


ctx.beginPath();

ctx.moveTo(x,0);

ctx.lineTo(x,h);

ctx.stroke();


}







for(let y=0;y<=h;y+=40){


ctx.beginPath();

ctx.moveTo(0,y);

ctx.lineTo(w,y);

ctx.stroke();


}







// eje X


ctx.strokeStyle="black";

ctx.lineWidth=2;


ctx.beginPath();

ctx.moveTo(0,centroY);

ctx.lineTo(w,centroY);

ctx.stroke();







// eje Y


ctx.beginPath();

ctx.moveTo(centroX,0);

ctx.lineTo(centroX,h);

ctx.stroke();







// función


let funcion =
document.getElementById("funcion").value;





if(funcion==""){


funcion="x*x";


}






ctx.strokeStyle="red";

ctx.lineWidth=3;



ctx.beginPath();





for(let x=-320;x<320;x++){



let y;


try{


y =
eval(
funcion.replaceAll(
"x",
`(${x})`
)
);



}catch(e){


y=0;


}






let px =
centroX+x;



let py =
centroY-y*0.01;







if(x==-320){


ctx.moveTo(px,py);



}else{


ctx.lineTo(px,py);


}



}





ctx.stroke();





}









function zoomMas(){


zoom +=0.1;



document.getElementById("circlechart").style.transform =

`scale(${zoom})`;



}








function zoomMenos(){



if(zoom>0.5){



zoom -=0.1;



document.getElementById("circlechart").style.transform =

`scale(${zoom})`;



}



}






graficar();




</script>





</body>


</html>
